<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoSphere | Search Cars</title>
  <link rel="stylesheet" href="../assets/css/styles.css">

  <style>
 .search-intro {
  text-align: center;
  margin-bottom: 2.5rem;
}

.search-intro .eyebrow {
  margin-inline: auto;
}

.search-intro h1 {
  max-width: none;
  text-align: center;
}

.search-intro p:last-child {
  max-width: 48rem;
  margin: 1.2rem auto 0;
}

.search-form {
  margin-top: 2.2rem;
}

.search-grid {
  display: grid;
  gap: 1.2rem;
  margin-top: 2rem;
}

.search-field {
  display: grid;
  gap: 0.55rem;
}

.search-field label {
  color: var(--color-ink);
  font-size: 0.95rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.search-field input {
  min-height: 3.4rem;
  width: 100%;
  padding: 0 1rem;
  border: 1px solid rgba(16, 24, 40, 0.12);
  border-radius: 1rem;
  background: rgba(255, 255, 255, 0.76);
  color: var(--color-ink);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
  transition: border-color 220ms ease, box-shadow 220ms ease, background 220ms ease;
}

.search-field input:focus {
  outline: none;
  border-color: rgba(255, 61, 127, 0.45);
  box-shadow: 0 0 0 4px rgba(255, 61, 127, 0.08);
  background: rgba(255, 255, 255, 0.92);
}

.search-field input::placeholder {
  color: var(--color-muted);
}

.search-message {
  min-height: 1.5rem;
  margin: 0;
  color: #b42318;
  font-size: 0.92rem;
  font-weight: 700;
  text-align: center;
}

.search-feedback {
  margin-top: 1.25rem;
  display: grid;
  justify-items: center;
  gap: 1rem;
}

.search-actions {
  display: flex;
  justify-content: center;
}

.search-actions .button {
  min-width: 12rem;
}

@media (min-width: 768px) {
  .search-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
  </style>
</head>
<body class="site-canvas site-page-shell">
  <header class="site-navbar" data-site-navbar>
    <a class="site-logo" href="../index.html" aria-label="AutoSphere home">AutoSphere</a>
    <nav class="desktop-nav" aria-label="Primary navigation">
      <a href="search.html" data-nav-link>Search</a>
      <a href="add-car.html" data-nav-link>Add Car</a>
      <a href="register.html" data-nav-link>Register</a>
      <a href="login.html" data-nav-link>Login</a>
    </nav>
    <button class="mobile-nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="mobile-nav" data-nav-toggle>
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation" data-mobile-nav>
      <a href="search.html" data-nav-link>Search</a>
      <a href="add-car.html" data-nav-link>Add Car</a>
      <a href="register.html" data-nav-link>Register</a>
      <a href="login.html" data-nav-link>Login</a>
    </nav>
  </header>

  <main class="member-page">
    <section class="shell-container member-page__panel shell-card">
      <div class="search-intro">
      <h1>Search Cars</h1>
      <p>
        Use this page to search for available cars in the system. Enter a model,
        a year, or both to view matching car results.
      </p>
      </div>

      <form class="search-form" id="searchForm" novalidate>
        <div class="search-grid">
          <div class="search-field">
            <label for="model">Model</label>
            <input type="text" id="model" name="model" placeholder="e.g. Camry, Civic">
          </div>

          <div class="search-field">
            <label for="year">Year</label>
            <input type="number" id="year" name="year" placeholder="e.g. 2022">
          </div>
        </div>

<div class="search-feedback">
  <p class="search-message" id="searchMessage" aria-live="polite"></p>

  <div class="search-actions">
    <button type="submit" class="button button-primary effect-glare effect-electric">
      Search
    </button>
  </div>
</div>

      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>QHE4103 Fundamentals of Web Technology · Shared shell by Member 1 wangchaoyu.</p>
  </footer>

  <script src="../assets/js/main.js"></script>
</body>
</html>
