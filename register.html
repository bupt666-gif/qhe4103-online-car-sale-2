<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoSphere | Seller Registration</title>
  <style>
    :root {
      --font-sans: "SF Pro Display", "Helvetica Neue", "Segoe UI", sans-serif;
      --color-ink: #101828;
      --color-ink-soft: #394456;
      --color-muted: #667085;
      --color-paper: #fffaf0;
      --color-panel: rgba(255, 255, 255, 0.68);
      --color-panel-strong: rgba(255, 255, 255, 0.88);
      --color-line: rgba(16, 24, 40, 0.1);
      --color-rose: #ff3d7f;
      --color-sun: #ffd43b;
      --color-lime: #40e69a;
      --color-sky: #00b4d8;
      --color-violet: #8a5cff;
      --page-max: 1540px;
      --nav-height: 74px;
      --radius-sm: 0.9rem;
      --radius-md: 1.35rem;
      --radius-lg: 2rem;
      --radius-xl: 2.7rem;
      --shadow-soft: 0 24px 80px rgba(24, 31, 53, 0.12);
      --shadow-card: 0 18px 46px rgba(16, 24, 40, 0.13);
      --shadow-glow: 0 26px 80px rgba(255, 61, 127, 0.16);
      --ease-premium: cubic-bezier(0.19, 1, 0.22, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      min-width: 320px;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--color-ink);
      font-family: var(--font-sans);
      background: linear-gradient(135deg, #fff7dd 0%, #eefcff 45%, #fff2f7 100%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
      padding: 0;
    }

    img,
    picture,
    svg {
      display: block;
      max-width: 100%;
    }

    img {
      height: auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
    }

    p,
    h1,
    h2,
    h3,
    ul,
    figure {
      margin: 0;
    }

    ul {
      padding: 0;
    }

    ::selection {
      color: white;
      background: var(--color-rose);
    }

    .shell-container {
      width: min(100% - 2rem, var(--page-max));
      margin-inline: auto;
    }

    .shell-card {
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.38)),
                  rgba(255, 255, 255, 0.52);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(24px) saturate(1.08);
    }

    .site-canvas {
      position: relative;
      isolation: isolate;
      overflow-x: clip;
      min-height: 100vh;
    }

    .site-page-shell {
      background: linear-gradient(135deg, #fff7dd 0%, #eefcff 45%, #fff2f7 100%);
    }

    .site-navbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      width: min(100% - 3rem, var(--page-max));
      min-height: var(--nav-height);
      margin: 0.95rem auto 0;
      padding: 0.65rem 1.05rem 0.65rem 1.6rem;
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 18px 58px rgba(24, 31, 53, 0.1);
      backdrop-filter: blur(24px) saturate(1.18);
    }

    .site-logo {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 2.25rem;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--color-rose), #ff9f1c 34%, var(--color-lime) 67%, var(--color-sky));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 0.92rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-shadow: 0 10px 24px rgba(255, 61, 127, 0.12);
      text-transform: none;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      gap: 0.95rem;
    }

    .desktop-nav a {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 2.7rem;
      border-radius: 999px;
      color: rgba(16, 24, 40, 0.72);
      font-size: 0.9rem;
      font-weight: 750;
      letter-spacing: -0.02em;
      padding: 0 1rem;
      transition: all 220ms ease;
      text-transform: capitalize;
    }

    .desktop-nav a[href="register.html"] {
      color: var(--color-ink);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(16, 24, 40, 0.06);
    }

    .desktop-nav a:hover {
      color: var(--color-ink);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(16, 24, 40, 0.06);
      transform: translateY(-1px);
    }

    .mobile-nav-toggle,
    .mobile-nav {
      display: none;
    }
    .member-page {
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: calc(100vh - var(--nav-height) - 4rem);
      padding: clamp(3.5rem, 8vw, 7rem) 0;
    }

    .member-page__panel {
      padding: clamp(2rem, 6vw, 4.5rem);
      max-width: 800px; 
      width: 90%; 
      margin: 0 auto; 
    }

    .eyebrow {
      display: none;
    }
    .member-page h1 {
      max-width: 100%; 
      margin-top: 0; 
      font-size: clamp(2.7rem, 9vw, 6.8rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
      color: var(--color-ink);
      font-weight: 900;
      margin-bottom: 1.5rem;
      text-transform: none;
    }

    .member-page p {
      max-width: 100%; 
      margin-top: 1.2rem;
      color: var(--color-ink-soft);
      font-size: clamp(1rem, 1.6vw, 1.25rem);
      line-height: 1.75;
      margin-bottom: 2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
      max-width: 500px;
      margin: 2rem auto 0; 
    }

    form div {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.95rem;
      color: #333;
      font-weight: 500;
      text-transform: capitalize;
    }

    input {
      padding: 0.75rem 1rem;
      border: 1px solid rgba(16, 24, 40, 0.1);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      transition: border-color 0.2s;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
    }

    input:focus {
      outline: none;
      border-color: var(--color-sky);
      box-shadow: 0 0 0 2px rgba(0, 180, 216, 0.1);
    }

    button {
      background: linear-gradient(90deg, var(--color-rose), var(--color-sky));
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      text-transform: capitalize;
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 700;
      transition: all 0.2s;
      margin-top: 1rem;
      min-height: 3rem;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 61, 127, 0.2);
    }

    @media (max-width: 768px) {
      .desktop-nav {
        display: none;
      }

      .mobile-nav-toggle {
        display: flex;
        flex-direction: column;
        gap: 4px;
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 4px;
      }

      .mobile-nav-toggle span {
        width: 24px;
        height: 2px;
        background-color: var(--color-ink); 
        border-radius: 2px;
      }

      .mobile-nav {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.8); 
        border-bottom: 1px solid #eee;
        flex-direction: column;
        padding: 1rem;
        gap: 1rem;
      }

      .mobile-nav.active {
        display: flex;
      }

      .member-page__panel {
        padding: 2rem 1.5rem;
        width: 95%; 
      }

      .member-page__panel h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body class="site-canvas site-page-shell">
  <header class="site-navbar" data-site-navbar>
    <a class="site-logo" href="../index.html" aria-label="AutoSphere home">AutoSphere</a>
    <nav class="desktop-nav" aria-label="Primary navigation">
      <a href="search.html" data-nav-link>Search</a>
      <a href="add-car.html" data-nav-link>Add Car</a>
      <a href="register.html" data-nav-link>Register</a>
      <a href="login.html" data-nav-link>Login</a>
    </nav>
    <button class="mobile-nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="mobile-nav" data-nav-toggle>
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation" data-mobile-nav>
      <a href="search.html" data-nav-link>Search</a>
      <a href="add-car.html" data-nav-link>Add Car</a>
      <a href="register.html" data-nav-link>Register</a>
      <a href="login.html" data-nav-link>Login</a>
    </nav>
  </header>

  <main class="member-page">
    <section class="shell-container member-page__panel shell-card">
      <h1>Seller<br>Registration</h1>
      <p>This page keeps the shared AutoSphere shell ready for the seller registration workflow.</p>
      
      <form id="regForm" onsubmit="return validateForm()">
        <div>
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Only letters & space">
        </div>
        <div>
          <label>Address</label>
          <input type="text" id="address" placeholder="Letters, numbers & space">
        </div>
        <div>
          <label>Phone</label>
          <input type="text" id="phone" placeholder="China phone number">
        </div>
        <div>
          <label>Email</label>
          <input type="text" id="email" placeholder="xxx@xx.com / xxx@xx.cn">
        </div>
        <div>
          <label>Username</label>
          <input type="text" id="user" placeholder="Min 6 letters/numbers">
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="pwd" placeholder="Min 6 letters/numbers">
        </div>
        <button type="submit">Register</button>
      </form>
    </section>
  </main>

  <script>
    const navToggle = document.querySelector('[data-nav-toggle]');
    const mobileNav = document.querySelector('[data-mobile-nav]');
    
    navToggle.addEventListener('click', () => {
      const isExpanded = navToggle.getAttribute('aria-expanded') === 'true';
      navToggle.setAttribute('aria-expanded', !isExpanded);
      mobileNav.classList.toggle('active');
    });

    function validateForm() {
      let name = document.getElementById("name").value.trim();
      let address = document.getElementById("address").value.trim();
      let phone = document.getElementById("phone").value.trim();
      let email = document.getElementById("email").value.trim();
      let user = document.getElementById("user").value.trim();
      let pwd = document.getElementById("pwd").value.trim();

      let regName = /^[A-Za-z ]+$/;
      if (!regName.test(name)) {
        alert("Name can only contain letters and space");
        return false;
      }

      let regAddr = /^[A-Za-z0-9 ]+$/;
      if (!regAddr.test(address)) {
        alert("Address can only contain letters, numbers and space");
        return false;
      }
      let regPhone = /^1[3-9]\d{9}$/;
      if (!regPhone.test(phone)) {
        alert("Please enter valid China phone number");
        return false;
      }

      let regEmail = /^[^@]+@[^@]+\.(com|cn)$/;
      if (!regEmail.test(email)) {
        alert("Email must have one @ and end with .com or .cn");
        return false;
      }

      let regUser = /^[A-Za-z0-9]{6,}$/;
      if (!regUser.test(user)) {
        alert("Username must be at least 6 letters/numbers");
        return false;
      }
      let regPwd = /^[A-Za-z0-9]{6,}$/;
      if (!regPwd.test(pwd)) {
        alert("Password must be at least 6 letters/numbers");
        return false;
      }

      alert("Registration success!");
      return true;
    }
  </script>
</body>
</html>
